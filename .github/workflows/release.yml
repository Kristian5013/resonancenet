name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: x86_64-linux
            triplet: x64-linux
            archive: tar.gz
          - os: windows-latest
            name: win64
            triplet: x64-windows
            archive: zip
          - os: macos-14
            name: arm64-darwin
            triplet: arm64-osx
            archive: tar.gz

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libssl-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config openssl@3

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg (Linux/Windows)
        if: runner.os != 'macOS'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b33e4f286a55ef6'

      - name: Cache vcpkg packages (Linux/Windows)
        if: runner.os != 'macOS'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg/installed
          key: vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.triplet }}-

      - name: Configure (Linux/Windows)
        if: runner.os != 'macOS'
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_STANDARD=20
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_STANDARD=20
          -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Build
        run: cmake --build build --parallel

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG_NAME="resonancenet-${VERSION}-${{ matrix.name }}"
          mkdir -p "${PKG_NAME}"
          for bin in rnetd rnet-cli rnet-tx rnet-wallet-tool rnet-util rnet-miner; do
            cp "build/${bin}" "${PKG_NAME}/"
          done
          cp COPYING README.md "${PKG_NAME}/"
          tar czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          echo "ARCHIVE=${PKG_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG_NAME="resonancenet-${VERSION}-${{ matrix.name }}"
          mkdir -p "${PKG_NAME}"
          for bin in rnetd rnet-cli rnet-tx rnet-wallet-tool rnet-util rnet-miner; do
            cp "build/${bin}.exe" "${PKG_NAME}/"
          done
          cp COPYING README.md "${PKG_NAME}/"
          7z a "${PKG_NAME}.zip" "${PKG_NAME}"
          echo "ARCHIVE=${PKG_NAME}.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create source archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git archive --format=tar.gz --prefix="resonancenet-${VERSION}/" \
            -o "artifacts/resonancenet-${VERSION}-source.tar.gz" HEAD

      - name: List release assets
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ResonanceNet ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: artifacts/*
